<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dia dos Namorados</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      background: #12040a;
      color: white;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px;
      text-align: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .screen.active {
      display: flex;
      opacity: 1;
    }

    .photo {
      width: min(85vw, 380px);
      height: min(60vh, 480px);
      object-fit: cover;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(255, 80, 130, 0.35);
      border: 2px solid rgba(255, 255, 255, 0.25);
      margin-bottom: 28px;
    }

    .text {
      max-width: 650px;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      line-height: 1.25;
      color: #ffe6ef;
      text-shadow: 0 0 20px rgba(255, 90, 140, 0.5);
    }

    .fade-text {
      opacity: 0;
      transform: translateY(18px);
      animation: softAppear 2s ease forwards;
    }

    @keyframes softAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .typing {
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
      font-size: clamp(1.8rem, 8vw, 3rem);
      color: #fff0f6;
      text-shadow: 0 0 24px rgba(255, 80, 140, 0.8);
    }

    .fade-out {
      animation: fadeOut 2s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(0.96);
      }
    }

    .final {
      background:
        radial-gradient(circle at top left, rgba(255, 80, 150, 0.45), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 190, 210, 0.35), transparent 35%),
        linear-gradient(135deg, #2a0613, #5b1028, #16040b);
    }

    .final-card {
      padding: 36px 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
      animation: softAppear 2s ease forwards;
    }

    .final h1 {
      font-size: clamp(2.4rem, 10vw, 4.5rem);
      margin-bottom: 14px;
      color: #fff;
    }

    .final p {
      font-size: clamp(1.3rem, 5vw, 2rem);
      color: #ffe6ef;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      color: rgba(255, 210, 225, 0.8);
      animation: floatUp 7s linear infinite;
      font-size: 22px;
    }

    @keyframes floatUp {
      from {
        transform: translateY(110vh) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      to {
        transform: translateY(-15vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="hearts" id="hearts"></div>

  <section class="screen active" id="screen1">
    <img src="foto1.PNG" class="photo" alt="Nossa foto">
    <div class="text typing" id="typing"></div>
  </section>

  <section class="screen" id="screen2">
    <img src="foto2.PNG" class="photo" alt="Nossa foto">
    <div class="text fade-text">
      Primeiro! Preciso que você separe uma roupa bonita pra se arrumar bastante a noite
    </div>
  </section>

  <section class="screen" id="screen3">
    <img src="foto3.PNG" class="photo" alt="Nossa foto">
    <div class="text fade-text">
      Segundo! Esteja disponível a partir das 15
    </div>
  </section>

  <section class="screen" id="screen4">
    <img src="foto4.PNG" class="photo" alt="Nossa foto">
    <div class="text fade-text">
      Terceiro! Seja você mesma e aproveite o dia
    </div>
  </section>

  <section class="screen final" id="screen5">
    <img src="foto5.PNG" class="photo" alt="Nossa foto">
    <div class="final-card">
      <h1>Te amo Bê</h1>
      <p>espero você na sexta</p>
    </div>
  </section>

  <script>
    const text = "amor i love you";
    const typingElement = document.getElementById("typing");
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        typingElement.textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, 120);
      } else {
        setTimeout(() => {
          typingElement.classList.add("fade-out");

          setTimeout(() => {
            typingElement.classList.remove("typing");
            typingElement.classList.remove("fade-out");
            typingElement.textContent =
              "Tenho algo muito legal preparado para essa sexta, mas preciso que você faça algumas coisas pra mim antes";
            typingElement.classList.add("fade-text");

            setTimeout(() => {
              nextScreen(1, 2);
            }, 4200);
          }, 2000);
        }, 1200);
      }
    }

    function nextScreen(current, next) {
      const currentScreen = document.getElementById(`screen${current}`);
      const nextScreen = document.getElementById(`screen${next}`);

      currentScreen.classList.remove("active");

      setTimeout(() => {
        nextScreen.classList.add("active");
      }, 500);

      if (next < 5) {
        setTimeout(() => {
          nextScreenFunc(next, next + 1);
        }, 5200);
      }
    }

    function nextScreenFunc(current, next) {
      nextScreen(current, next);
    }

    function createHearts() {
      const hearts = document.getElementById("hearts");

      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = "♥";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 5 + Math.random() * 4 + "s";
        heart.style.fontSize = 16 + Math.random() * 22 + "px";

        hearts.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 9000);
      }, 450);
    }

    typeWriter();
    createHearts();
  </script>

</body>
</html>
